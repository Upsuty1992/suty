<DOCTYPE html>
<html lang="en">
    <head>
<meta charset="UTF-8">
<title>Hide and show elements</title>
    </head>
    <body>
        <p id="course">NAITECHS are Wonderful</p>
        <button onclick="hide()">Hide Element</button>
    </body>
    <script>
        function hide(){
            document.getElementById("course").style.display="none"
        }

    </script>
</html>
