<html lang="en">
<head>

<link
href="https://font.googleapis.com/css2?family=poppins:wght@400:500:600:700&

<style>
      *{
        margin: 0;
        padding: o;
        box-sizing: border-box;
    font-family: 'poppins',sans-serif;
    }
    body {
    background-color: #ff7a7a;
    background-image:
    url('https://www.transparent textures.com/patterns/cubes.png');
    display: flex;
    justify-content: center;
align-items: center;
height: 100vh;
    }
    .container{
        width: 1100px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
        .left {
            width: 45%;
            color: white;
        }
        .left h1{
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 20px;
        }
.left p{
    font-size: 16;
    line-height: 1.6;
}
.right{
    width :40%;
}
.trial-box{
background: #5e54a4;
color: white;
text-align: center;
padding: 15px;
border-radius: 8px;
margin-bottom: 20px;
font-size: 14px;
}
.form-box{
    background: white;
    padding: 30;
    border-radius: 10px;
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}
.form-box input {
    width: 100%;
    padding: 15px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-weight: 14px;
}
.form-box input:focus{
    outline: non;
    border-color: #5e54a4;
}
.form-box button{
     width: 100%;
    padding: 15px;
    background: #38cc8c;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 5px;
    cursor: pointer;
}
.form-box button:hover{
    background: #2bb673;
}
.form-box small{
    display: block;
    text-align: center;
    margin-top: 15px;
    font-size: 12px;
    color: #999;
}
.form-box small span{
    color: #ff6b6b;
    font-weight: bold;
}
/* Responsive */
@media(max-width:768px){
    .container{
        flex-direction: colomn;
        text-align: center;
    }
    .left, .right {
        width: 100%;
    }
    .left{
        margin-bottom: 30px;
    }
}
</style>
</head>
<body>
    <div class="container">
        <div class="left">
            <h1>Learn how to code by watching others</h1>
            <p>
                See how experinced developers solve problems in real-time. watching script tutorials is great, but understanding how developers think
            </p>
        </div>
        <div class="form-box">
            <input type="text" placeholder="First Name">
            <input type="text" placeholder="Last Name">
            <input type="email" placeholder="Email Address">
            <input type="password"placeholder="password">
            <button>CLAIM YOR FREE TRIAL</button>

                By clicking the button, you are agreeing to our
                <span>Terms and services</span>
            </small>
        </div>
    </div>
</div>
